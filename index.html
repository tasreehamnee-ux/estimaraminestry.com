<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Example</title>
</head>
<body>
    <h1>Submit Your Issue</h1>
    <form id="issueForm">
        <label for="issueTitle">Issue Title:</label>
        <input type="text" id="issueTitle" name="issueTitle" required><br><br>

        <label for="issueDescription">Description:</label>
        <textarea id="issueDescription" name="issueDescription" required></textarea><br><br>

        <label for="issueType">Type of Issue:</label>
        <select id="issueType" name="issueType" required>
            <option value="bug">Bug</option>
            <option value="feature">Feature Request</option>
            <option value="other">Other</option>
        </select><br><br>

        <input type="submit" value="Submit Issue">
    </form>
    <script>
        document.getElementById('issueForm').addEventListener('submit', function(event) {
            event.preventDefault();
            // Handle form submission
            alert('Submitting your issue!');
        });
    </script>
</body>
</html>
